name: Build check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  client-build:
    name: Client build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

  server-boot:
    name: Server boots and responds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci
        working-directory: server

      # No test suite exists yet, so this is the actual compile/runtime
      # check for the server: start it for real and confirm it answers,
      # rather than just checking the syntax parses.
      - name: Boot server and hit health check
        working-directory: server
        env:
          JWT_SECRET: ci-only-secret-do-not-use-in-production-0000000000
          NODE_ENV: production
          PORT: 3001
          DB_PATH: /tmp/havoro-ci.db
        run: |
          node index.js &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Server responded after ${i}s"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not respond within 30s"
          kill $SERVER_PID || true
          exit 1

  electron-build:
    name: Electron app builds (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Install server deps
        run: npm ci --omit=dev
        working-directory: server

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 python3-setuptools make g++

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install Electron deps
        run: npm ci
        working-directory: electron

      - name: Rebuild native modules
        run: npm run rebuild
        working-directory: electron

      # --dir skips installer packaging (NSIS/AppImage) — this only needs to
      # prove the app compiles and packages cleanly against whatever
      # Electron/electron-builder version is in play, not produce a
      # distributable artifact. release.yml does the real installer build.
      - name: Build Electron app (unpacked)
        run: npm run build:${{ matrix.platform }} -- --dir
        working-directory: electron
